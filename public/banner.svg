<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" width="1080" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f0fc"/>
      <stop offset="50%" stop-color="#f5eefc"/>
      <stop offset="100%" stop-color="#ece0f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#7b2d8e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9b59b6" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="360" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="920" cy="80" r="180" fill="#ede0f5" opacity="0.5"/>
  <circle cx="1000" cy="300" r="140" fill="#dcc8f0" opacity="0.3"/>
  <circle cx="60" cy="280" r="100" fill="#e8d5f5" opacity="0.3"/>

  <!-- Decorative petals -->
  <g transform="translate(880, 60)" opacity="0.25">
    <ellipse rx="28" ry="14" fill="#9b59b6" transform="rotate(0)"/>
    <ellipse rx="28" ry="14" fill="#9b59b6" transform="rotate(60)"/>
    <ellipse rx="28" ry="14" fill="#9b59b6" transform="rotate(120)"/>
  </g>
  <g transform="translate(140, 100)" opacity="0.15">
    <ellipse rx="20" ry="10" fill="#7b2d8e" transform="rotate(30)"/>
    <ellipse rx="20" ry="10" fill="#7b2d8e" transform="rotate(90)"/>
    <ellipse rx="20" ry="10" fill="#7b2d8e" transform="rotate(150)"/>
  </g>

  <!-- Divider line -->
  <line x1="100" y1="180" x2="360" y2="180" stroke="#c39bd3" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="180" x2="980" y2="180" stroke="#c39bd3" stroke-width="1" opacity="0.5"/>

  <!-- Main title -->
  <text x="540" y="130" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
        font-size="56" font-weight="600" fill="url(#accent)" letter-spacing="12" filter="url(#shadow)">
    浪漫诱惑
  </text>

  <!-- Subtitle -->
  <text x="540" y="175" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
        font-size="20" fill="#a070c0" letter-spacing="6">
    静谧生活 · 品质之选
  </text>

  <!-- Tag line -->
  <text x="540" y="230" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
        font-size="14" fill="#b890d0" letter-spacing="4">
    心遇好物 · 旗下品质专送 · 官方授权正品保障 · 隐私包装
  </text>

  <!-- Small decorative dots -->
  <circle cx="200" cy="130" r="2" fill="#9b59b6" opacity="0.3"/>
  <circle cx="880" cy="130" r="2" fill="#9b59b6" opacity="0.3"/>
  <circle cx="180" cy="168" r="1.5" fill="#a070c0" opacity="0.25"/>
  <circle cx="900" cy="168" r="1.5" fill="#a070c0" opacity="0.25"/>
</svg>
